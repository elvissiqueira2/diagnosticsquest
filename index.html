<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>Hardware Diagnostics Quest</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    .font-orbitron { font-family: 'Orbitron', monospace; }
    .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); } 50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.6); } }
    .pulse-glow { animation: pulse-glow 2s infinite; }
    .glass-effect { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 136, 0.2); }
    .circuit-pattern { background-image: linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px); background-size: 40px 40px; }
    @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
    .scanline { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 136, 0.1); animation: scanline 8s linear infinite; pointer-events: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 255, 136, 0.3); border-radius: 10px; }
    .progress-bar { background: linear-gradient(90deg, #00ff88, #00ccff); box-shadow: 0 0 20px rgba(0, 255, 136, 0.5); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn-cyber { position: relative; overflow: hidden; transition: all 0.3s ease; }
    .btn-cyber::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); transform: rotate(45deg); transition: 0.5s; opacity: 0; }
    .btn-cyber:hover::after { left: 100%; opacity: 1; }
    input:focus { box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
  </style>
</head>
<body class="h-full bg-slate-900 text-white font-rajdhani overflow-hidden select-none">
  <div id="app" class="h-full w-full relative circuit-pattern overflow-hidden flex flex-col">
    <div class="scanline"></div>

    <div id="screen-login" class="flex-1 flex flex-col items-center justify-center p-6 relative z-10">
      <div class="text-center mb-12">
        <h1 class="font-orbitron text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-cyan-400 to-emerald-400 tracking-tighter mb-2">HARDWARE DIAGNOSTICS</h1>
        <p class="text-emerald-400 font-orbitron tracking-widest text-sm opacity-80">BIO-LEVEL SECURITY SYSTEM v3.0</p>
      </div>

      <div class="glass-effect rounded-2xl p-8 w-full max-w-md border-t-4 border-emerald-500 shadow-2xl relative">
        <div class="absolute -top-3 -right-3 bg-emerald-500 text-slate-900 text-[10px] font-bold px-2 py-1 rounded">STATUS: ONLINE</div>
        <div class="mb-6">
          <label class="block text-emerald-400 text-xs font-orbitron mb-2 tracking-widest uppercase">Identificação do Técnico</label>
          <input type="text" id="input-player-name" placeholder="NOME DO TÉCNICO" class="w-full bg-slate-800/50 border-2 border-emerald-500/30 rounded-lg px-4 py-4 text-white font-orbitron focus:border-emerald-400 outline-none transition-all placeholder:text-slate-600">
        </div>
        <div class="mb-8">
          <label class="block text-emerald-400 text-xs font-orbitron mb-2 tracking-widest uppercase">Turma / Unidade</label>
          <input type="text" id="input-player-group" placeholder="EX: INFRA-A" class="w-full bg-slate-800/50 border-2 border-emerald-500/30 rounded-lg px-4 py-4 text-white font-orbitron focus:border-emerald-400 outline-none transition-all placeholder:text-slate-600">
        </div>
        <button onclick="startGame()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-orbitron font-black py-5 rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-[0_0_30px_rgba(16,185,129,0.4)] mb-4">INICIAR MISSÃO</button>
        <button onclick="showLeaderboard()" class="w-full text-emerald-400/70 hover:text-emerald-400 font-orbitron text-xs tracking-widest py-2 transition-colors">RANKING GLOBAL</button>
      </div>
    </div>

    <div id="screen-game" class="hidden flex-1 flex flex-col p-4 relative z-10">
      <header class="flex justify-between items-center mb-4 glass-effect p-4 rounded-xl">
        <div>
          <h2 id="display-player-name" class="font-orbitron text-emerald-400 font-bold leading-none">TECH_ADMIN</h2>
          <p id="display-player-group" class="text-xs text-slate-400 font-medium">GRUPO_OP</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-400 font-orbitron">SCORE XP</p>
          <p id="display-score" class="font-orbitron text-2xl text-cyan-400 font-black leading-none">0000</p>
        </div>
      </header>

      <div class="flex-1 flex flex-col gap-4 min-h-0">
        <div class="glass-effect rounded-2xl p-6 flex-1 flex flex-col items-center justify-center text-center relative overflow-hidden border-2 border-emerald-500/20">
          <div id="beep-visual" class="absolute inset-0 bg-emerald-500/5 opacity-0 transition-opacity pointer-events-none"></div>
          <div class="mb-6">
            <div id="level-badge" class="inline-block px-3 py-1 bg-emerald-500/20 rounded-full border border-emerald-500/30 text-emerald-400 text-xs font-orbitron mb-4 uppercase tracking-widest">Nível 01</div>
            <h3 id="question-text" class="text-2xl md:text-3xl font-orbitron font-bold leading-tight mb-4">SISTEMA INICIALIZANDO...</h3>
            <p id="question-hint" class="text-slate-400 text-sm italic">Prepare-se para o diagnóstico do POST</p>
          </div>
          <button onclick="playBeepCode()" class="pulse-glow bg-slate-800 hover:bg-slate-700 w-24 h-24 rounded-full border-4 border-emerald-500 flex items-center justify-center transition-all group">
            <svg class="w-10 h-10 text-emerald-400 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v18l-7-7H3V10h2l7-7zm6.5 9c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 4.45v.2c0 .38.25.71.6.85C17.18 6.53 19 9.06 19 12s-1.82 5.47-4.4 6.5c-.35.14-.6.47-.6.85v.2c0 .63.63 1.07 1.21.85C18.23 19.11 21 15.86 21 12s-2.77-7.11-5.79-8.4c-.58-.23-1.21.22-1.21.85z"/></svg>
          </button>
        </div>

        <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 pb-4">
          </div>
      </div>

      <footer class="mt-auto pt-4 border-t border-slate-800 flex items-center gap-4">
        <div class="flex-1 h-3 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
          <div id="progress-bar" class="progress-bar h-full w-0"></div>
        </div>
        <span id="timer" class="font-orbitron text-xl text-emerald-400 w-12 text-center">30</span>
      </footer>
    </div>

    <div id="screen-game-over" class="hidden flex-1 flex flex-col items-center justify-center p-6 relative z-10 bg-slate-950/80 backdrop-blur-xl">
      <div class="text-center">
        <div class="mb-6 inline-block p-4 rounded-full bg-emerald-500/10 border-2 border-emerald-500">
          <svg class="w-16 h-16 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h2 class="font-orbitron text-4xl font-black text-white mb-2 uppercase tracking-tighter">Missão Concluída</h2>
        <p class="text-emerald-400 font-orbitron text-sm tracking-widest mb-8">RELATÓRIO DE DIAGNÓSTICO ENVIADO</p>
        
        <div class="grid grid-cols-2 gap-4 mb-10">
          <div class="glass-effect p-6 rounded-2xl border-t-2 border-cyan-500">
            <p class="text-slate-400 text-xs uppercase font-bold mb-1">XP Total</p>
            <p id="final-score" class="font-orbitron text-4xl text-cyan-400 font-black">0</p>
          </div>
          <div class="glass-effect p-6 rounded-2xl border-t-2 border-emerald-500">
            <p class="text-slate-400 text-xs uppercase font-bold mb-1">Desafios</p>
            <p id="final-challenges" class="font-orbitron text-4xl text-emerald-400 font-black">0</p>
          </div>
        </div>

        <div class="flex flex-col gap-3">
          <button onclick="location.reload()" class="bg-emerald-500 text-slate-900 font-orbitron font-bold py-4 px-12 rounded-xl hover:bg-emerald-400 transition-all">NOVA MISSÃO</button>
          <button onclick="showLeaderboard()" class="text-emerald-400 font-orbitron text-sm py-2 hover:underline">RANKING GLOBAL</button>
        </div>
      </div>
    </div>

    <div id="leaderboard-modal" class="hidden fixed inset-0 bg-slate-950/95 z-50 p-4 md:p-8 overflow-y-auto">
      <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8">
          <h2 class="font-orbitron text-3xl text-emerald-400 font-bold tracking-tighter italic uppercase underline decoration-emerald-500/30">Ranking Global</h2>
          <button onclick="closeLeaderboard()" class="text-slate-400 hover:text-white text-5xl font-light">&times;</button>
        </div>
        <div id="leaderboard-list" class="space-y-3 custom-scrollbar pr-2">
          </div>
      </div>
    </div>

  </div>

  <script>
    // --- CONFIGURAÇÃO DO SUPABASE ---
    const SB_URL = "https://pqtrsgtzrmrmjbijzqvg.supabase.co"; // COLOQUE SUA URL AQUI
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxdHJzZ3R6cm1ybWpiaWp6cXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTg3NTYsImV4cCI6MjA4ODM5NDc1Nn0.RXeyQrzDxofqewTJZhBpaHOnozBNYei1Lb7Log3QRww"; // COLOQUE SUA CHAVE AQUI
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // Banco de Perguntas (Seu original)
    const challenges = [
      { id: 1, title: 'POST BEEP CODE', question: 'Um bip curto e rápido seguido de silêncio.', options: ['Sistema OK', 'Falha na RAM', 'Erro de Teclado', 'Problema na BIOS'], correct: 0, bips: [0.2], xp: 100 },
      { id: 2, title: 'POST BEEP CODE', question: 'Três bips longos contínuos.', options: ['Fonte de Alimentação', 'Processador', 'Falha na RAM', 'Placa de Vídeo'], correct: 2, bips: [0.8, 0.8, 0.8], xp: 150 },
      { id: 3, title: 'POST BEEP CODE', question: 'Um bip longo seguido de dois curtos.', options: ['Memória RAM', 'Placa de Vídeo (VGA)', 'HDD/SSD', 'Cooler'], correct: 1, bips: [0.8, 0.2, 0.2], xp: 200 },
      { id: 4, title: 'POST BEEP CODE', question: 'Bipes constantes e repetitivos.', options: ['Superaquecimento', 'Fonte de Energia', 'Memória RAM', 'Bios Corrompida'], correct: 1, bips: [0.4, 0.4, 0.4, 0.4, 0.4], xp: 250 },
      { id: 5, title: 'POST BEEP CODE', question: 'Nenhum som ao ligar, cooler gira.', options: ['Sistema OK', 'CPU Morta/Sem Alimentação', 'Teclado Desconectado', 'SSD Falhou'], correct: 1, bips: [], xp: 300 }
    ];

    let gameState = {
      playerName: '',
      playerGroup: '',
      score: 0,
      currentChallenge: 0,
      challengesCompleted: 0,
      timer: 30,
      timerInterval: null
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function startGame() {
      const name = document.getElementById('input-player-name').value.trim();
      const group = document.getElementById('input-player-group').value.trim();
      
      if (name.length < 3) return alert("Por favor, identifique-se adequadamente.");
      
      gameState.playerName = name;
      gameState.playerGroup = group || 'GERAL';
      
      document.getElementById('display-player-name').innerText = gameState.playerName.toUpperCase();
      document.getElementById('display-player-group').innerText = gameState.playerGroup.toUpperCase();
      
      document.getElementById('screen-login').classList.add('hidden');
      document.getElementById('screen-game').classList.remove('hidden');
      
      loadChallenge();
    }

    function loadChallenge() {
      if (gameState.currentChallenge >= challenges.length) {
        endGame();
        return;
      }

      const challenge = challenges[gameState.currentChallenge];
      document.getElementById('question-text').innerText = challenge.question;
      document.getElementById('level-badge').innerText = `Nível 0${gameState.currentChallenge + 1}`;
      document.getElementById('progress-bar').style.width = `${((gameState.currentChallenge) / challenges.length) * 100}%`;
      
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      
      challenge.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'glass-effect p-4 text-left rounded-xl hover:bg-emerald-500/10 border-2 border-emerald-500/10 hover:border-emerald-500/50 transition-all font-semibold uppercase text-sm md:text-base';
        btn.innerHTML = `<span class="text-emerald-500 mr-2 font-orbitron">${idx + 1}.</span> ${opt}`;
        btn.onclick = () => checkAnswer(idx);
        grid.appendChild(btn);
      });

      startTimer();
    }

    function checkAnswer(idx) {
      clearInterval(gameState.timerInterval);
      const challenge = challenges[gameState.currentChallenge];
      
      if (idx === challenge.correct) {
        gameState.score += (challenge.xp + (gameState.timer * 2));
        gameState.challengesCompleted++;
        gameState.currentChallenge++;
        document.getElementById('display-score').innerText = String(gameState.score).padStart(4, '0');
        loadChallenge();
        saveToSupabase(); // Salva a cada acerto
      } else {
        alert("DIAGNÓSTICO INCORRETO! O SISTEMA REINICIOU.");
        endGame();
      }
    }

    async function saveToSupabase() {
      const { error } = await supabase
        .from('ranking')
        .upsert([{ 
          player_name: gameState.playerName, 
          class_group: gameState.playerGroup, 
          total_score: gameState.score,
          challenges_completed: gameState.challengesCompleted,
          updated_at: new Date()
        }], { onConflict: 'player_name' });

      if (error) console.error("Erro Supabase:", error);
    }

    async function showLeaderboard() {
      const modal = document.getElementById('leaderboard-modal');
      const list = document.getElementById('leaderboard-list');
      modal.classList.remove('hidden');
      list.innerHTML = '<p class="text-center py-8 animate-pulse text-emerald-400 font-orbitron">ACESSANDO TERMINAL...</p>';

      const { data, error } = await supabase
        .from('ranking')
        .select('*')
        .order('total_score', { ascending: false })
        .limit(15);

      if (error) {
        list.innerHTML = '<p class="text-red-400">Erro ao carregar banco de dados.</p>';
        return;
      }

      list.innerHTML = data.map((p, i) => `
        <div class="glass-effect p-4 rounded-xl flex items-center justify-between border-l-4 ${i < 3 ? 'border-emerald-400' : 'border-slate-700'}">
          <div class="flex items-center gap-4">
            <span class="font-orbitron text-2xl text-slate-500 w-8">#${i+1}</span>
            <div>
              <p class="font-bold text-white uppercase">${p.player_name}</p>
              <p class="text-[10px] text-emerald-500/60 font-orbitron">${p.class_group}</p>
            </div>
          </div>
          <div class="text-right">
            <p class="font-orbitron text-xl text-cyan-400">${p.total_score}</p>
            <p class="text-[10px] text-slate-500 uppercase">XP</p>
          </div>
        </div>
      `).join('');
    }

    function closeLeaderboard() {
      document.getElementById('leaderboard-modal').classList.add('hidden');
    }

    function startTimer() {
      gameState.timer = 30;
      document.getElementById('timer').innerText = gameState.timer;
      clearInterval(gameState.timerInterval);
      gameState.timerInterval = setInterval(() => {
        gameState.timer--;
        document.getElementById('timer').innerText = gameState.timer;
        if (gameState.timer <= 0) {
          clearInterval(gameState.timerInterval);
          alert("TEMPO ESGOTADO! FALHA NO DIAGNÓSTICO.");
          endGame();
        }
      }, 1000);
    }

    function playBeepCode() {
      const bips = challenges[gameState.currentChallenge].bips;
      const visual = document.getElementById('beep-visual');
      let offset = 0;
      
      bips.forEach(duration => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 800;
          gain.gain.value = 0.1;
          osc.start();
          visual.style.opacity = '1';
          setTimeout(() => { 
            osc.stop(); 
            visual.style.opacity = '0';
          }, duration * 1000);
        }, offset * 1000);
        offset += duration + 0.2;
      });
    }

    function endGame() {
      clearInterval(gameState.timerInterval);
      document.getElementById('screen-game').classList.add('hidden');
      document.getElementById('screen-game-over').classList.remove('hidden');
      document.getElementById('final-score').innerText = gameState.score;
      document.getElementById('final-challenges').innerText = gameState.challengesCompleted;
      saveToSupabase();
    }
  </script>
</body>
</html>
