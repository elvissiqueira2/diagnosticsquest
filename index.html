<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Hardware Diagnostics Quest - SENAC</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        // ============================================================
        // CONFIGURAÇÃO DO PROFESSOR (COLE SEUS DADOS AQUI)
        // ============================================================
        const SUPABASE_URL = 'https://pqtrsgtzrmrmjbijzqvg.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_UpsbwhnG2heMDTaPLq_7TA_CBmiRCuA';
        // ============================================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <style>
        * { box-sizing: border-box; }
        .font-orbitron { font-family: 'Orbitron', monospace; }
        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
        .glass-effect { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0, 255, 136, 0.2); }
        .circuit-pattern { background-image: linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="h-full bg-slate-950 text-white font-rajdhani circuit-pattern">

    <div id="app" class="min-h-full flex flex-col items-center justify-center p-4">
        
        <div id="login-screen" class="glass-effect p-8 rounded-3xl w-full max-w-md text-center shadow-2xl">
            <h1 class="font-orbitron text-3xl font-black text-emerald-400 mb-6 uppercase tracking-tighter">Diagnostics Quest</h1>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs text-emerald-500 font-bold ml-1">NOME DO TÉCNICO</label>
                    <input type="text" id="player-name" placeholder="Ex: Elvis Siqueira" class="w-full bg-slate-800 border-2 border-emerald-500/30 rounded-xl px-4 py-3 focus:border-emerald-400 outline-none">
                </div>
                <div>
                    <label class="text-xs text-emerald-500 font-bold ml-1">TURMA / GRUPO</label>
                    <input type="text" id="class-group" placeholder="Ex: Infra-2024" class="w-full bg-slate-800 border-2 border-emerald-500/30 rounded-xl px-4 py-3 focus:border-emerald-400 outline-none">
                </div>
                <button onclick="iniciarMissao()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-orbitron font-bold transition-all transform hover:scale-105">INICIAR MISSÃO</button>
                <button onclick="verRanking()" class="w-full text-emerald-400 text-sm font-bold pt-2">🏆 VER RANKING ATUAL</button>
            </div>
        </div>

        <div id="ranking-screen" class="hidden fixed inset-0 bg-slate-950/95 flex items-center justify-center p-4 z-50">
            <div class="glass-effect p-6 rounded-2xl w-full max-w-lg">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-orbitron text-xl text-emerald-400 italic">RANKING DOS ALUNOS</h2>
                    <button onclick="fecharRanking()" class="text-2xl text-slate-500 hover:text-white">&times;</button>
                </div>
                <div id="ranking-list" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                    </div>
            </div>
        </div>

        <div id="game-screen" class="hidden text-center">
            <h2 class="font-orbitron text-2xl mb-4">SISTEMA EM DIAGNÓSTICO...</h2>
            <p class="text-slate-400 mb-8">O aluno está respondendo as questões agora.</p>
            <button onclick="finalizarComSucesso()" class="bg-cyan-600 px-8 py-3 rounded-lg font-bold">SIMULAR FIM DO JOGO (1000 PONTOS)</button>
        </div>

    </div>

    <script>
        let currentName = "";
        let currentGroup = "";

        function iniciarMissao() {
            currentName = document.getElementById('player-name').value;
            currentGroup = document.getElementById('class-group').value;

            if (!currentName || !currentGroup) {
                alert("Por favor, preencha seu nome e sua turma!");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }

        // --- FUNÇÃO QUE ENVIA PARA O SUPABASE ---
        async function finalizarComSucesso() {
            const pontosFinal = 1000; // Aqui você usaria a variável real de pontos do seu jogo
            
            try {
                const { error } = await supabase
                    .from('players')
                    .insert([{ 
                        player_name: currentName, 
                        class_group: currentGroup,
                        total_score: pontosFinal,
                        challenges_completed: 5,
                        current_level: 1
                    }]);

                if (error) throw error;

                alert("Pontuação salva com sucesso no banco!");
                verRanking();
            } catch (err) {
                console.error("Erro ao salvar:", err.message);
                alert("Erro ao conectar com o banco. Verifique suas chaves.");
            }
        }

        async function verRanking() {
            document.getElementById('ranking-screen').classList.remove('hidden');
            const list = document.getElementById('ranking-list');
            list.innerHTML = "<p class='text-center text-slate-500'>Buscando dados no servidor...</p>";

            const { data, error } = await supabase
                .from('players')
                .select('player_name, total_score, class_group')
                .order('total_score', { ascending: false })
                .limit(10);

            if (error) {
                list.innerHTML = "<p class='text-red-400'>Erro ao carregar ranking.</p>";
                return;
            }

            list.innerHTML = data.map((p, i) => `
                <div class="flex justify-between items-center p-4 bg-slate-900/50 rounded-xl border border-emerald-500/20">
                    <div>
                        <span class="text-xs text-emerald-500 font-bold block">${i+1}º LUGAR</span>
                        <span class="font-bold text-white uppercase">${p.player_name}</span>
                        <span class="text-xs text-slate-400 ml-2">[${p.class_group}]</span>
                    </div>
                    <div class="text-right">
                        <span class="font-orbitron text-xl text-emerald-400">${p.total_score}</span>
                        <span class="text-[10px] text-emerald-600 block italic font-bold">PONTOS</span>
                    </div>
                </div>
            `).join('');
            
            if(data.length === 0) list.innerHTML = "Nenhum aluno no ranking ainda.";
        }

        function fecharRanking() {
            document.getElementById('ranking-screen').classList.add('hidden');
            // Se o jogo acabou, volta pro login
            if (!document.getElementById('game-screen').classList.contains('hidden')) {
                location.reload();
            }
        }
    </script>
</body>
</html>
